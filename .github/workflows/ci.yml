name: ci

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# forgefx-midi is self-contained (no sibling checkout needed). The gate mirrors the
# local one: build FIRST (the devices-smoke suite loads descriptors from dist/), then
# the full test chain (run-all + check-browser-safe + catalog:check + cache:check).
jobs:
  build-test:
    name: build + test (goldens + browser-safe + catalog:check + cache:check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test

  # ADVISORY, NOT A GATE (continue-on-error): the fixed cross-repo change chain lands
  # protocol facts HERE FIRST, so a breaking codec change is EXPECTED to fail the ForgeFX
  # server suite until ForgeFX ripples the change up. This job is early-warning signal —
  # it tells us the downstream server still builds/typechecks/tests against codec HEAD —
  # but it must never block a legitimate protocol-first change. Checks out ForgeFX's
  # default branch and builds the codec + server side by side (the server links the codec
  # as a sibling file: dependency).
  downstream-forgefx:
    name: "downstream: ForgeFX server vs this codec (advisory)"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          path: forgefx-midi
      - uses: actions/checkout@v4
        with:
          repository: sKuhLight/ForgeFX
          path: ForgeFX
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            forgefx-midi/package-lock.json
            ForgeFX/server/package-lock.json
      - name: Build codec (this checkout — server exports resolve to dist/)
        working-directory: forgefx-midi
        run: |
          npm ci
          npm run build
      - name: ForgeFX server typecheck + tests against codec HEAD
        working-directory: ForgeFX/server
        run: |
          npm ci
          npm run typecheck
          npm test

  # Enforce a version bump on every non-docs PR (a stale package version breaks the
  # release chain: tags are cut off package.json and downstream repos pin our refs).
  # PR-only — push/dispatch runs have no base branch to diff against. Docs-only PRs
  # (nothing but *.md changed) are waved through. Compare rule: numeric major.minor.patch,
  # and on an equal triple a prerelease (-beta) ranks BELOW its release; head must be > base.
  version-guard:
    name: version bump guard (PRs)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Require a version bump (unless docs-only)
        env:
          PKG: package.json
        shell: bash
        run: |
          set -euo pipefail
          # fetch-depth 0 isn't needed — fetch just the base ref, one commit deep. HEAD is the
          # PR MERGE commit, so a plain two-commit tree diff vs the base tip IS the PR delta
          # (a three-dot diff would need a merge base, which shallow fetches don't have).
          git fetch origin "$GITHUB_BASE_REF" --depth=1
          CHANGED="$(git diff --name-only "origin/$GITHUB_BASE_REF" HEAD)"
          echo "Changed files:"; echo "$CHANGED"
          NON_MD="$(echo "$CHANGED" | grep -vE '\.md$' || true)"
          if [ -z "$NON_MD" ]; then
            echo "docs-only PR — version bump not required." | tee -a "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          HEAD_VER="$(node -p "require('./$PKG').version")"
          BASE_VER="$(git show "origin/$GITHUB_BASE_REF:$PKG" | node -p "JSON.parse(require('fs').readFileSync(0,'utf8')).version")"
          echo "Base $PKG version: $BASE_VER"
          echo "Head $PKG version: $HEAD_VER"
          HEAD_VER="$HEAD_VER" BASE_VER="$BASE_VER" PKG="$PKG" node -e '
            const parse = v => {
              const [core, pre = ""] = String(v).split("-");
              return { nums: core.split(".").map(Number), pre };
            };
            const cmp = (a, b) => {
              const pa = parse(a), pb = parse(b);
              for (let i = 0; i < 3; i++) {
                const d = (pa.nums[i] || 0) - (pb.nums[i] || 0);
                if (d) return d < 0 ? -1 : 1;
              }
              if (pa.pre === pb.pre) return 0;
              if (pa.pre === "") return 1;   // a release outranks a prerelease of the same triple
              if (pb.pre === "") return -1;
              return pa.pre < pb.pre ? -1 : (pa.pre > pb.pre ? 1 : 0);
            };
            const head = process.env.HEAD_VER, base = process.env.BASE_VER, pkg = process.env.PKG;
            if (cmp(head, base) > 0) {
              console.log(`OK: ${head} > ${base}`);
            } else {
              console.error(`Version not bumped: head ${head} is not greater than base ${base}.`);
              console.error(`Fix: run \`npm version X.Y.Z --no-git-tag-version\` (this also bumps the lockfile) and commit.`);
              process.exit(1);
            }
          '
