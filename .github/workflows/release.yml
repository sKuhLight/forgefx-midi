name: release

# Stage 1 of the cross-repo release chain (forgefx-midi → ForgeFX → Axis → axisapp.live).
# Triggered by a version tag (vX.Y.Z) — normally pushed automatically by release-on-main.yml
# after a merged PR, but a hand-pushed tag works identically (recovery path). Runs the FULL
# gate, injects the tag's version into package.json before building, publishes a GitHub release
# with the packed tarball + release-manifest.json, and notifies ForgeFX that a new codec
# release exists so it re-validates + opens a pin-bump PR. See docs/RELEASING.md.
on:
  push:
    tags: ['v*']

# Serialize per tag; never cancel an in-flight release (a re-run recomputes idempotently).
concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: gate + publish + notify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # Version is derived from the tag, not committed to master. Inject it into package.json
      # BEFORE npm ci/build so scripts/gen-version.ts regenerates src/version.ts from the tag
      # (and the packed tarball carries the right version). --allow-same-version keeps a
      # hand-pushed tag on an already-bumped tree from failing.
      - name: Inject version from tag
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version
      # Full gate — build FIRST (the devices-smoke suite reads descriptors from dist/),
      # then the complete test chain, exactly like ci.yml.
      - run: npm ci
      - run: npm run build
      - run: npm test
      - name: Pack tarball (forgefx-midi-<version>.tgz)
        run: npm pack
      # Release manifest (schemaVersion 1): the machine-readable record of this stage's
      # release, uploaded as a release asset AND embedded in the codec-released dispatch so
      # downstream never implicitly tracks HEAD. Chain root → mints chainId; no upstream pins.
      - name: Write release-manifest.json
        env:
          CHAIN_ID: forgefx-midi@${{ github.ref_name }}
        run: |
          set -euo pipefail
          V="${GITHUB_REF_NAME#v}"
          jq -n \
            --argjson schemaVersion 1 \
            --arg repository "sKuhLight/forgefx-midi" \
            --arg version "$V" \
            --arg tag "${GITHUB_REF_NAME}" \
            --arg commit "${GITHUB_SHA}" \
            --arg channel "stable" \
            --arg chainId "$CHAIN_ID" \
            --argjson upstream '{}' \
            --argjson artifacts "$(printf '["forgefx-midi-%s.tgz"]' "$V")" \
            --arg createdAt "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{schemaVersion:$schemaVersion, repository:$repository, version:$version, tag:$tag, commit:$commit, channel:$channel, chainId:$chainId, upstream:$upstream, artifacts:$artifacts, createdAt:$createdAt}' \
            > release-manifest.json
          echo "release-manifest.json:"; cat release-manifest.json
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          name: forgefx-midi ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            *.tgz
            release-manifest.json
      # Cross-repo dispatch: tell ForgeFX CI a new codec release landed so it re-validates
      # the server against codec default-branch HEAD (which now contains this tagged release)
      # and opens a pin-bump PR. Payload keeps the existing {version, tag, sha} and ADDs
      # {chain_id, manifest} (the compact release manifest). Soft-gated: if STACK_DISPATCH_TOKEN
      # is unset, print a notice and succeed (same pattern as Axis deploy-remote's gate) so
      # forks / unconfigured repos never see a red X.
      - name: Notify ForgeFX (codec-released)
        env:
          TOKEN: ${{ secrets.STACK_DISPATCH_TOKEN }}
          CHAIN_ID: forgefx-midi@${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ -z "$TOKEN" ]; then
            echo "STACK_DISPATCH_TOKEN not configured — skipping ForgeFX notify."
            exit 0
          fi
          VERSION="$(node -p "require('./package.json').version")"
          PAYLOAD="$(jq -n \
            --arg version "$VERSION" \
            --arg tag "${GITHUB_REF_NAME}" \
            --arg sha "${GITHUB_SHA}" \
            --arg chain_id "$CHAIN_ID" \
            --argjson manifest "$(jq -c . release-manifest.json)" \
            '{event_type:"codec-released", client_payload:{version:$version, tag:$tag, sha:$sha, chain_id:$chain_id, manifest:$manifest}}')"
          curl -sf -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/sKuhLight/ForgeFX/dispatches \
            -d "$PAYLOAD"
